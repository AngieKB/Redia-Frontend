<app-navbar></app-navbar>

<div class="page-container">
    <div class="page-header">
        <div class="header-inner">
            <div>
                <h1 class="page-title">Dashboard Admin</h1>
                <p class="page-subtitle">Resumen general del sistema</p>
            </div>
        </div>
    </div>

    <div class="page-content">
        <!-- Stats Grid -->
        <div *ngIf="isLoading" style="text-align: center; padding: 2rem; color: var(--ion-color-medium);">
            Cargando estadísticas...
        </div>
        <div class="stats-grid four-cols" *ngIf="!isLoading">
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-info">
                    <span class="stat-label">Reservas Hoy</span>
                    <span class="stat-value large">{{ reservasHoy }}</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <span class="stat-label">Reservas del Mes</span>
                    <span class="stat-value large">{{ reservasMes }}</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <span class="stat-label">Clientes Registrados</span>
                    <span class="stat-value large">{{ usuariosRegistrados }}</span>
                </div>
            </div>
            <div class="stat-card accent" style="border-left-color: #c62828;">
                <div class="stat-icon">⊘</div>
                <div class="stat-info">
                    <span class="stat-label">Reservas Canceladas</span>
                    <span class="stat-value large" style="color: #c62828;">{{ reservasCanceladas }}</span>
                </div>
            </div>
        </div>

        <!-- Quick Access -->
        <div class="section-title">Accesos Rápidos</div>
        <div class="action-grid">
            <button class="action-card primary" routerLink="/admin/reservations">
                <span class="action-icon">📋</span>
                <span class="action-label">Ver Reservas</span>
                <span class="action-desc">Consultar todas las reservas</span>
            </button>

            <button class="action-card tertiary" routerLink="/admin/users">
                <span class="action-icon">👤</span>
                <span class="action-label">Gestionar Usuarios</span>
                <span class="action-desc">Crear, editar y eliminar usuarios</span>
            </button>

            <button class="action-card secondary" routerLink="/admin/menu">
                <span class="action-icon">🍽️</span>
                <span class="action-label">Gestionar Menú</span>
                <span class="action-desc">Crear, editar y eliminar platillos</span>
            </button>
        </div>
    </div>
</div>

<app-footer></app-footer>
