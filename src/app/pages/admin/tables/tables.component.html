<app-navbar></app-navbar>

<div class="page-container">
    <div class="page-header">
        <div class="header-inner">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="back-btn" routerLink="/admin/dashboard" title="Volver al Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div>
                    <h1 class="page-title">Mesas del Restaurante</h1>
                    <p class="page-subtitle">Configuración fija de las mesas</p>
                </div>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="info-notice">
            <span style="font-size: 1.4rem;">ℹ️</span>
            <div>
                <strong>Configuración fija de mesas</strong>
                <p>Las mesas del restaurante están predeterminadas y no requieren gestión manual desde el panel de administración.</p>
            </div>
        </div>

        <h2 class="section-title">Mesas disponibles</h2>
        <div class="tables-grid">
            <div class="table-card" *ngFor="let table of tables">
                <div class="table-icon">🪑</div>
                <div class="table-info">
                    <h3 class="table-name">Mesa {{ table.nombre }}</h3>
                    <p class="table-capacity">Capacidad: <strong>{{ table.capacidad }} personas</strong></p>
                </div>
            </div>
        </div>
    </div>
</div>

<app-footer></app-footer>
