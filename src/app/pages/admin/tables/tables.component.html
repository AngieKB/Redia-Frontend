<app-navbar></app-navbar>

<div class="page-container">
    <div class="page-header">
        <div class="header-inner">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="back-btn" routerLink="/admin/dashboard" title="Volver al Dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div>
                    <h1 class="page-title">Gestión de Mesas</h1>
                    <p class="page-subtitle">Administra las mesas del restaurante</p>
                </div>
            </div>
            <button class="btn-add" (click)="openCreate()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Nueva Mesa
            </button>
        </div>
    </div>

    <div class="page-content">

        <!-- Error message -->
        <div *ngIf="errorMessage" class="alert-error">{{ errorMessage }}</div>

        <!-- Loading -->
        <div *ngIf="isLoading" class="loading-text">Cargando mesas...</div>

        <!-- Tables Grid -->
        <div class="tables-grid" *ngIf="!isLoading">
            <div class="table-card" *ngFor="let table of tables">
                <div class="table-icon">🪑</div>
                <div class="table-info">
                    <h3 class="table-name">{{ table.nombre }}</h3>
                    <p class="table-capacity">Capacidad: <strong>{{ table.capacidad }} personas</strong></p>
                </div>
                <div class="table-actions">
                    <button class="btn-edit" (click)="openEdit(table)">Editar</button>
                    <button class="btn-delete" (click)="delete(table)">Eliminar</button>
                </div>
            </div>

            <div class="empty-tables" *ngIf="tables.length === 0">
                <p>No hay mesas registradas aún.</p>
                <button class="btn-add" (click)="openCreate()">Crear la primera mesa</button>
            </div>
        </div>

        <!-- Form Modal -->
        <div class="modal-backdrop" *ngIf="showForm" (click)="closeForm()"></div>
        <div class="modal-card" *ngIf="showForm">
            <div class="modal-header">
                <h3>{{ editingTable ? 'Editar Mesa' : 'Nueva Mesa' }}</h3>
                <button class="modal-close" (click)="closeForm()">✕</button>
            </div>

            <div class="form-group">
                <label>Nombre de la mesa</label>
                <input type="text" [(ngModel)]="formNombre" placeholder="Ej: Mesa 1 o Mesa Terraza" />
            </div>

            <div class="form-group">
                <label>Capacidad (personas)</label>
                <input type="number" [(ngModel)]="formCapacidad" placeholder="Ej: 4" min="1" max="20" />
            </div>

            <div *ngIf="formError" class="alert-error">{{ formError }}</div>

            <div class="modal-actions">
                <button class="btn-cancel-modal" (click)="closeForm()">Cancelar</button>
                <button class="btn-save" (click)="save()" [disabled]="isSaving">
                    {{ isSaving ? 'Guardando...' : (editingTable ? 'Guardar Cambios' : 'Crear Mesa') }}
                </button>
            </div>
        </div>
    </div>
</div>

<app-footer></app-footer>
