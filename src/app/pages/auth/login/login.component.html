<app-navbar></app-navbar>

<div class="auth-container">
  <div class="logo-section">
    <h2>Redia</h2>
    <p style="color: var(--ion-color-secondary); margin-top: -10px; margin-bottom: 30px;">Bienvenido de nuevo</p>
  </div>

  <form (ngSubmit)="login()" novalidate>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" placeholder="Correo electrónico" [(ngModel)]="email" name="email" autocomplete="email" />
      <div *ngIf="errors.email" class="inline-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ errors.email }}
      </div>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="password-group">
        <input [type]="showPassword ? 'text' : 'password'" placeholder="Contraseña" [(ngModel)]="password"
          name="password" autocomplete="current-password" />
        <span class="toggle-password-icon" (click)="togglePasswordVisibility()" title="Mostrar/Ocultar contraseña">
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
            </path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </span>
      </div>
      <div *ngIf="errors.password" class="inline-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ errors.password }}
      </div>
    </div>

    <div class="form-group recaptcha-wrapper"
      style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
      <re-captcha (resolved)="onCaptchaResolved($event)"
        siteKey="6Lcg2IMsAAAAABsnQqPhTVEBU0I2lg0Yxd39UaVH"></re-captcha>
      <div *ngIf="recaptchaError" class="inline-error" style="margin-top: 10px; width: 100%;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ recaptchaError }}
      </div>
    </div>

    <button type="submit">
      Iniciar sesión
    </button>

    <div *ngIf="errorMessage" class="inline-error">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      {{ errorMessage }}
    </div>
  </form>

  <div class="links">
    <a routerLink="/register">¿No tienes cuenta? Crear cuenta</a>
    <a routerLink="/recover-password">¿Olvidaste tu contraseña?</a>
  </div>
</div>

<app-footer></app-footer>
