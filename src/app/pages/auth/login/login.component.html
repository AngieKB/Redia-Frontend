<app-navbar></app-navbar>

<div class="auth-container">
  <div class="logo-section">
    <h2>Redia</h2>
    <p style="color: var(--ion-color-secondary); margin-top: -10px; margin-bottom: 30px;">Bienvenido de nuevo</p>
  </div>

  <form (ngSubmit)="login()">
    <div class="form-group">
      <input type="email" placeholder="Correo electrónico" [(ngModel)]="email" name="email" required
        autocomplete="email" />
    </div>

    <div class="form-group">
      <input type="password" placeholder="Contraseña" [(ngModel)]="password" name="password" required
        autocomplete="current-password" />
    </div>

    <button type="submit">
      Iniciar sesión
    </button>
  </form>

  <div class="links">
    <a routerLink="/register">¿No tienes cuenta? Crear cuenta</a>
    <a routerLink="/recover-password">¿Olvidaste tu contraseña?</a>
  </div>
</div>

<app-footer></app-footer>
