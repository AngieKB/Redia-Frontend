<div class="auth-container">
  <div class="logo-section">
    <h2>Redia</h2>
    <p style="color: var(--ion-color-secondary); margin-top: -10px; margin-bottom: 30px;">
      {{ showNewPasswordForm ? 'Restablecer Contraseña' : 'Recuperar Contraseña' }}
    </p>
  </div>

  <!-- Paso 1: Solicitar código -->
  <form (ngSubmit)="requestCode()" *ngIf="!showNewPasswordForm">
    <div class="form-group">
      <input 
        type="email" 
        placeholder="Correo electrónico" 
        [(ngModel)]="email" 
        name="email" 
        required 
        autocomplete="email"
      />
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Enviando...' : 'Enviar Código' }}
    </button>
  </form>

  <!-- Paso 2: Verificar código y nueva contraseña -->
  <form (ngSubmit)="resetPassword()" *ngIf="showNewPasswordForm">
    <div class="form-group">
      <input 
        type="text" 
        placeholder="Código de verificación" 
        [(ngModel)]="verificationCode" 
        name="verificationCode" 
        required 
        maxlength="6"
      />
    </div>

    <div class="form-group">
      <input 
        type="password" 
        placeholder="Nueva contraseña" 
        [(ngModel)]="newPassword" 
        name="newPassword" 
        required 
        autocomplete="new-password"
      />
    </div>

    <div class="form-group">
      <input 
        type="password" 
        placeholder="Confirmar contraseña" 
        [(ngModel)]="confirmPassword" 
        name="confirmPassword" 
        required 
        autocomplete="new-password"
      />
    </div>

    <button type="submit" [disabled]="loading || !isPasswordValid()">
      {{ loading ? 'Actualizando...' : 'Restablecer Contraseña' }}
    </button>
  </form>

  <!-- Mensaje de éxito -->
  <div class="success-message" *ngIf="codeSent">
    <p> Se ha enviado un código de verificación a tu correo electrónico</p>
    <p>Por favor, revisa tu bandeja de entrada y sigue las instrucciones</p>
  </div>

  <!-- Navegación -->
  <div class="links">
    <a routerLink="/login" *ngIf="!showNewPasswordForm">Volver al login</a>
    <button (click)="goBack()" *ngIf="showNewPasswordForm" class="back-btn">
      Volver
    </button>
  </div>
</div>
