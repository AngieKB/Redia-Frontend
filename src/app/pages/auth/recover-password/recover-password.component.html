<div class="auth-container">

    <h2>Recuperar contraseña</h2>

    <form (ngSubmit)="recover()">

        <input type="email" placeholder="Correo" [(ngModel)]="email" name="email" required />

        <input type="password" placeholder="Nueva contraseña" [(ngModel)]="nuevaPassword" name="nuevaPassword"
            required />

        <button type="submit">
            Actualizar contraseña
        </button>

    </form>

    <a routerLink="/login">
        Volver al login
    </a>

</div>
