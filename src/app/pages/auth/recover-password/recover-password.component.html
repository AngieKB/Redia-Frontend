<div class="auth-container">
  <div class="logo-section">
    <h2>Redia</h2>
    <p style="color: var(--ion-color-secondary); margin-top: -10px; margin-bottom: 30px;">
      {{ showNewPasswordForm ? 'Restablecer Contraseña' : 'Recuperar Contraseña' }}
    </p>
  </div>

  <!-- Paso 1: Solicitar código -->
  <form (ngSubmit)="requestCode()" *ngIf="!showNewPasswordForm">
    <div class="form-group">
      <input type="email" placeholder="Correo electrónico" [(ngModel)]="email" name="email" required
        autocomplete="email" />
    </div>

    <div class="form-group recaptcha-wrapper"
      style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
      <re-captcha (resolved)="onCaptchaResolved($event)"
        siteKey="6Lcg2IMsAAAAABsnQqPhTVEBU0I2lg0Yxd39UaVH"></re-captcha>
      <div *ngIf="recaptchaError" class="inline-error"
        style="color: var(--ion-color-danger); margin-top: 10px; font-size: 0.9rem; font-weight: 500;">
        {{ recaptchaError }}
      </div>
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Enviando...' : 'Enviar Código' }}
    </button>
  </form>

  <!-- Mensaje de éxito -->
  <div class="success-message" *ngIf="codeSent">
    <p> Se ha enviado un código de verificación a tu correo electrónico</p>
    <p>Serás redirigido para crear tu nueva contraseña...</p>
  </div>

  <!-- Navegación -->
  <div class="links">
    <a routerLink="/login">Volver al login</a>
  </div>
</div>
