<app-navbar></app-navbar>

<div class="auth-container">
  <div class="logo-section">
    <h2>Redia</h2>
    <p style="color: var(--ion-color-secondary); margin-top: -10px; margin-bottom: 30px;">Crear nueva cuenta</p>
  </div>

  <form (ngSubmit)="register()">
    <div class="form-group">
      <input type="text" placeholder="Nombre completo" [(ngModel)]="nombre" name="nombre" required
        autocomplete="name" />
    </div>

    <div class="form-group">
      <input type="email" placeholder="Correo electrónico" [(ngModel)]="email" name="email" required
        autocomplete="email" />
    </div>

    <div class="form-group">
      <input type="password" placeholder="Contraseña" [(ngModel)]="password" name="password" required
        autocomplete="new-password" />
    </div>

    <div class="form-group">
      <input type="password" placeholder="Confirmar contraseña" [(ngModel)]="confirmPassword" name="confirmPassword"
        required autocomplete="new-password" />
    </div>

    <div *ngIf="passwordError" style="color: red; font-size: 0.9rem; margin-bottom: 15px; text-align: center;">
      {{ passwordError }}
    </div>

    <button type="submit">
      Registrarse
    </button>
  </form>

  <div class="links">
    <a routerLink="/login">
      ¿Ya tienes cuenta? Iniciar sesión
    </a>
  </div>
</div>

<app-footer></app-footer>
