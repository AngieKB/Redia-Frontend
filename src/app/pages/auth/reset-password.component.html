<app-navbar></app-navbar>

<div class="auth-container">
    <div class="logo-section">
        <h2>Redia</h2>
        <p style="color: var(--ion-color-secondary); margin-top: -10px; margin-bottom: 30px;">Crear nueva contraseña</p>
    </div>

    <form (ngSubmit)="resetPassword()">
        <div class="form-group">
            <input type="password" placeholder="Nueva contraseña" [(ngModel)]="password" name="password" required
                autocomplete="new-password" />
        </div>

        <div class="form-group">
            <input type="password" placeholder="Confirmar contraseña" [(ngModel)]="confirmPassword"
                name="confirmPassword" required autocomplete="new-password" />
        </div>

        <div *ngIf="passwordError" style="color: red; font-size: 0.9rem; margin-bottom: 15px; text-align: center;">
            {{ passwordError }}
        </div>

        <button type="submit">
            Cambiar Contraseña
        </button>
    </form>

    <div class="links">
        <a routerLink="/login">
            Volver al inicio de sesión
        </a>
    </div>
</div>

<app-footer></app-footer>
