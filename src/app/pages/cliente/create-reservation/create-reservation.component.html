<app-navbar></app-navbar>

<div class="page-container">
    <div class="page-header">
        <div class="header-inner"
            style="display: flex; align-items: center; justify-content: center; position: relative; width: 100%;">
            <button class="back-btn" routerLink="/cliente/my-reservations"
                style="background: none; border: none; cursor: pointer; color: white; position: absolute; left: 0px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div style="text-align: center;">
                <h1 class="page-title">Nueva Reserva</h1>
                <p class="page-subtitle">Prepara tu mesa con nosotros</p>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="form-container">
            <div class="form-header-section">
                <h2 class="form-title">Preparar tu mesa</h2>
                <p class="form-subtitle">Selecciona los detalles de tu reserva.</p>
            </div>

            <form (ngSubmit)="onSubmit()" #reserveForm="ngForm" novalidate>
                <!-- Número de Personas -->
                <div class="form-group">
                    <label>Número de Personas <span class="hint">(Máximo 32)</span></label>
                    <div class="input-wrapper">
                        <input type="number" [(ngModel)]="numeroPersonas" name="numeroPersonas" placeholder="Ej: 4"
                            min="1" max="32" required>
                    </div>
                    <div *ngIf="errors.personas" class="inline-error">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        {{ errors.personas }}
                    </div>
                </div>

                <!-- Fecha -->
                <div class="form-group">
                    <label>Fecha de la Reserva</label>
                    <div class="input-wrapper">
                        <input type="date" [(ngModel)]="fecha" name="fecha" [min]="minDate" (change)="onFechaChange()"
                            required>
                    </div>
                    <div *ngIf="errors.fecha" class="inline-error">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        {{ errors.fecha }}
                    </div>
                </div>

                <div class="form-row">
                    <!-- Hora Entrada -->
                    <div class="form-group">
                        <label>Hora de Inicio</label>
                        <div class="input-wrapper">
                            <input type="time" [(ngModel)]="horaEntrada" name="horaEntrada"
                                (change)="onHoraEntradaChange()" [min]="minHoraEntrada" [max]="maxHoraEntrada" required>
                        </div>
                        <div *ngIf="errors.horaEntrada" class="inline-error">
                            {{ errors.horaEntrada }}
                        </div>
                    </div>

                    <!-- Hora Salida -->
                    <div class="form-group">
                        <label>Hora de Fin</label>
                        <div class="input-wrapper">
                            <input type="time" [(ngModel)]="horaSalida" name="horaSalida" [min]="minHoraSalidaField"
                                [max]="maxHoraSalidaField" required>
                        </div>
                        <div *ngIf="errors.horaSalida" class="inline-error">
                            {{ errors.horaSalida }}
                        </div>
                    </div>
                </div>

                <div class="info-banner" *ngIf="fecha">
                    <p class="hint-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        Horario: Lunes a Viernes 8am-10pm, Sábados 8am-4pm. Máximo 3 horas.
                    </p>
                </div>

                <div *ngIf="errorMessage" class="main-error">
                    {{ errorMessage }}
                </div>

                <button type="submit" class="submit-btn" [disabled]="isLoading">
                    <span *ngIf="!isLoading">Confirmar Reserva</span>
                    <span *ngIf="isLoading">Procesando...</span>
                </button>

                <button type="button" class="cancel-btn" routerLink="/cliente/my-reservations">
                    Volver a Mis Reservas
                </button>
            </form>
        </div>
    </div>
</div>

<app-footer></app-footer>
