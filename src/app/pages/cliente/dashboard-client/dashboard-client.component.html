<app-navbar></app-navbar>

<div class="page-container">
  <div class="page-header">
    <div class="header-inner">
      <div>
        <h1 class="page-title">Mi Panel</h1>
        <p class="page-subtitle">Gestiona tus reservas en Redia</p>
      </div>
    </div>
  </div>

  <div class="page-content">
    <!-- Stats Row -->
    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-info">
          <span class="stat-label">Próxima Reserva</span>
          <span class="stat-value">Sábado, 8 Mar 2026</span>
          <span class="stat-sub">19:00 – 20:30 · 4 personas</span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-label">Reservas Realizadas</span>
          <span class="stat-value large">12</span>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="section-title">Acciones Rápidas</div>
    <div class="action-grid">
      <button class="action-card primary" routerLink="/cliente/create-reservation">
        <span class="action-label">Crear Reserva</span>
        <span class="action-desc">Reserva tu mesa ahora</span>
      </button>
      <button class="action-card secondary" routerLink="/cliente/my-reservations">
        <span class="action-label">Ver Mis Reservas</span>
        <span class="action-desc">Historial y estado de reservas</span>
      </button>
    </div>
  </div>
</div>

<app-footer></app-footer>
