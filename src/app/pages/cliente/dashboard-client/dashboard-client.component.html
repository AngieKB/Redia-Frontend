<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="header-content">
      <h1>Bienvenido a Redia</h1>
      <button (click)="logout()" class="logout-btn">
        Cerrar Sesión
      </button>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="welcome-card">
      <h2>Mi Panel</h2>
      <p>Gestiona tus reservas y experiencia en Redia</p>
      
      <div class="dashboard-stats">
        <div class="stat-card">
          <h3>Mis Reservas</h3>
          <p class="stat-number">0</p>
        </div>
        <div class="stat-card">
          <h3>Restaurantes</h3>
          <p class="stat-number">0</p>
        </div>
        <div class="stat-card">
          <h3>Visitas</h3>
          <p class="stat-number">0</p>
        </div>
      </div>

      <div class="action-buttons">
        <button class="action-btn">Hacer Reserva</button>
        <button class="action-btn">Ver Restaurantes</button>
        <button class="action-btn">Mi Perfil</button>
      </div>
    </div>
  </main>
</div>
