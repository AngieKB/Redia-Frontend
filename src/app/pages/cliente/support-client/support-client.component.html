<app-navbar></app-navbar>

<div class="support-container">

    <div class="header-section">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                class="help-icon">
                <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                </path>
            </svg>
        </div>
        <h2>¿Necesitas ayuda?</h2>
        <p>Estamos aquí para resolver tus dudas.</p>
    </div>

    <div class="support-card">
        <div class="card-header">
            <h3>Contacto Rápido</h3>
        </div>
        <div class="card-content">
            <div class="contact-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="contact-icon">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                </svg>
                <span>+1 234 567 8900</span>
            </div>
            <div class="contact-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="contact-icon">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span>soporte&#64;redia.com</span>
            </div>
        </div>
    </div>

    <div class="support-card mb-large">
        <div class="card-header">
            <h3>Déjanos un mensaje</h3>
        </div>
        <div class="card-content">
            <form (ngSubmit)="sendMessage()">
                <div class="form-group">
                    <label>Asunto</label>
                    <input type="text" placeholder="Ej: Duda sobre menú" [(ngModel)]="asunto" name="asunto" required>
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="4" placeholder="Escribe aquí tu duda o sugerencia..." [(ngModel)]="mensaje"
                        name="mensaje" required></textarea>
                </div>

                <button type="submit" class="send-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Enviar Mensaje
                </button>
            </form>
        </div>
    </div>

</div>
