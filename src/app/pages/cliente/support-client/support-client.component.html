<app-navbar></app-navbar>

<div class="support-container">

    <div class="header-section">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                class="help-icon">
                <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                </path>
            </svg>
        </div>
        <div
            style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; position: relative;">
            <button class="back-btn" (click)="goBack()"
                style="background: none; border: none; cursor: pointer; color: var(--ion-text-color); position: absolute; left: 20px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 style="margin: 0;">¿Necesitas ayuda?</h2>
        </div>
        <p>Estamos aquí para resolver tus dudas.</p>
    </div>

    <div class="support-card mb-large" style="text-align: center; padding: 40px 20px;">
        <h3 style="margin-bottom: 30px; color: var(--ion-text-color);">Elige cómo deseas contactarnos</h3>

        <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">

            <!-- Botón de WhatsApp -->
            <div
                style="width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <span style="font-size: 14px; color: var(--ion-color-medium); font-weight: 500;">Teléfono: 318 611
                    3505</span>
                <a href="https://wa.me/573186113505" target="_blank" class="send-button"
                    style="background-color: #25D366; text-decoration: none; width: 100%; display: flex; justify-content: center; font-size: 16px; margin-top: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right: 12px;">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                        </path>
                    </svg>
                    Escribir por WhatsApp
                </a>
            </div>

            <!-- Botón de Correo -->
            <div
                style="width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <span style="font-size: 14px; color: var(--ion-color-medium); font-weight: 500;">Correo:
                    redia.serviciocliente&#64;gmail.com</span>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=redia.serviciocliente@gmail.com" target="_blank"
                    class="send-button"
                    style="background-color: #853953; text-decoration: none; width: 100%; display: flex; justify-content: center; font-size: 16px; margin-top: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right: 12px;">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    Enviar Correo
                </a>
            </div>

        </div>
    </div>

</div>
