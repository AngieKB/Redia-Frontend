<app-navbar></app-navbar>

<div class="page-container">
    <div class="page-header">
        <div class="header-inner">
            <div>
                <h1 class="page-title">Mi Perfil</h1>
                <p class="page-subtitle">Información de tu cuenta</p>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="profile-layout">

            <!-- Avatar Card -->
            <div class="avatar-card">
                <div class="avatar-circle">{{ user.nombre.charAt(0) }}</div>
                <h2 class="avatar-name">{{ user.nombre }}</h2>
                <span class="role-badge role-{{ user.rol }}">{{ user.rol }}</span>
            </div>

            <!-- Info Card -->
            <div class="info-card">
                <h3 class="info-title">Información Personal</h3>

                <div class="info-group">
                    <span class="info-label">Nombre</span>
                    <span class="info-value">{{ user.nombre }}</span>
                </div>

                <div class="info-group">
                    <span class="info-label">Email</span>
                    <span class="info-value">{{ user.email }}</span>
                </div>

                <div class="info-group">
                    <span class="info-label">Teléfono</span>
                    <span class="info-value">{{ user.telefono || '—' }}</span>
                </div>

                <div class="info-actions">
                    <button class="btn-primary" (click)="editarDatos()">
                        Editar Datos
                    </button>
                    <button class="btn-secondary" (click)="cambiarContrasena()">
                        Cambiar Contraseña
                    </button>
                </div>
            </div>
        </div>

        <!-- Edit Form -->
        <div class="form-card edit-form" *ngIf="editMode">
            <div class="edit-form-header">
                <h3>Editar Datos</h3>
                <button class="modal-close" (click)="cancelarEdicion()">✕</button>
            </div>
            <form (ngSubmit)="guardarCambios()">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" [(ngModel)]="editUser.nombre" name="nombre" placeholder="Tu nombre completo"
                        required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" [(ngModel)]="editUser.email" name="email" placeholder="correo@ejemplo.com"
                        required />
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" [(ngModel)]="editUser.telefono" name="telefono" placeholder="+57 300 000 0000" />
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" (click)="cancelarEdicion()">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>

        <!-- Change Password Form -->
        <div class="form-card edit-form" *ngIf="passwordMode">
            <div class="edit-form-header">
                <h3>Cambiar Contraseña</h3>
                <button class="modal-close" (click)="cancelarContrasena()">✕</button>
            </div>
            <form (ngSubmit)="guardarContrasena()">
                <div class="form-group">
                    <label>Contraseña Actual</label>
                    <input type="password" [(ngModel)]="passwords.actual" name="actual" placeholder="••••••••"
                        required />
                </div>
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" [(ngModel)]="passwords.nueva" name="nueva" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                    <label>Confirmar Nueva Contraseña</label>
                    <input type="password" [(ngModel)]="passwords.confirmar" name="confirmar" placeholder="••••••••"
                        required />
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" (click)="cancelarContrasena()">Cancelar</button>
                    <button type="submit" class="btn-primary">Actualizar Contraseña</button>
                </div>
            </form>
        </div>
    </div>
</div>

<app-footer></app-footer>
